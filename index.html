<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESL Rainbows Orange Vol.2 Quiz</title>
  <style>
    :root{--bg:#fff7ed;--panel:#fff;--text:#1f2937;--muted:#6b7280;--brand:#f97316;--brand2:#fb923c;--line:#fed7aa;--good:#16a34a;--bad:#dc2626;--shadow:0 18px 45px rgba(124,45,18,.14)}
    [data-theme=dark]{--bg:#111827;--panel:#1f2937;--text:#f9fafb;--muted:#d1d5db;--brand:#fb923c;--brand2:#fdba74;--line:#374151;--shadow:0 18px 45px rgba(0,0,0,.35)}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top left,rgba(251,146,60,.25),transparent 34%),var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Noto Sans KR,sans-serif} button{font:inherit} .app{display:grid;grid-template-columns:320px 1fr;min-height:100vh}.sidebar{padding:22px;border-right:1px solid var(--line);background:rgba(255,255,255,.55);backdrop-filter:blur(10px);overflow:auto}.brand{font-weight:900;font-size:1.35rem;margin:0 0 8px}.sub{color:var(--muted);margin:0 0 18px}.lesson{width:100%;text-align:left;border:1px solid var(--line);background:var(--panel);color:var(--text);padding:12px;border-radius:14px;margin:8px 0;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.04)}.lesson.active{outline:3px solid var(--brand);border-color:var(--brand)}.score-badge{float:right;color:var(--brand);font-weight:800}.main{padding:28px;max-width:980px;width:100%;margin:0 auto}.topbar{display:flex;gap:10px;justify-content:space-between;align-items:center;margin-bottom:18px}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;background:var(--brand);color:white;padding:10px 14px;border-radius:999px;cursor:pointer;font-weight:800}.btn.secondary{background:var(--panel);color:var(--text);border:1px solid var(--line)}.hamb{display:none}.card{background:var(--panel);border:1px solid var(--line);border-radius:26px;padding:24px;box-shadow:var(--shadow)}.progress{height:12px;background:rgba(249,115,22,.18);border-radius:999px;overflow:hidden;margin:12px 0 22px}.bar{height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));width:0;transition:.25s}.definition{font-size:1.35rem;line-height:1.5;font-weight:800}.kw{color:var(--brand)}.options{display:grid;gap:12px;margin:20px 0}.option{border:2px solid var(--line);background:var(--panel);color:var(--text);padding:14px 16px;border-radius:18px;text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px}.option.correct{border-color:var(--good);background:rgba(22,163,74,.13)}.option.wrong{border-color:var(--bad);background:rgba(220,38,38,.12)}.speak{border:0;background:transparent;font-size:1.2rem;cursor:pointer;padding:4px 8px}.hint,.rationales,.review{border:1px dashed var(--line);padding:14px;border-radius:16px;background:rgba(251,146,60,.08);margin-top:12px}.rationales li,.review li{margin:8px 0}.hidden{display:none!important}.share{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.qr{max-width:160px;border-radius:12px;background:white;padding:6px}.overlay{display:none}.status{color:var(--muted);min-height:1.4em}.pill{display:inline-block;background:rgba(249,115,22,.14);color:var(--brand);padding:6px 10px;border-radius:999px;font-weight:800}@media(max-width:820px){.app{grid-template-columns:1fr}.hamb{display:inline-block}.sidebar{position:fixed;inset:0 22% 0 0;z-index:3;transform:translateX(-105%);transition:.2s;box-shadow:var(--shadow)}.sidebar.open{transform:translateX(0)}.overlay.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2}.main{padding:18px}.topbar{align-items:flex-start}.actions{justify-content:flex-end}.card{padding:18px}.definition{font-size:1.1rem}}
  </style>
</head>
<body>
  <div class="overlay" id="overlay"></div>
  <div class="app">
    <aside class="sidebar" id="sidebar"><h1 class="brand">🌈 Orange Vol.2</h1><p class="sub">Unit-Lesson을 자유롭게 선택하세요.</p><div id="lessonList"></div></aside>
    <main class="main">
      <div class="topbar"><button class="btn secondary hamb" id="menuBtn">☰ Lesson</button><div class="actions"><button class="btn secondary" id="themeBtn">🌙 다크 모드</button></div></div>
      <section class="card" id="app">불러오는 중...</section>
    </main>
  </div>
  <script src="env.js"></script>
  <script>
    const state={data:null,lessons:[],lesson:null,index:0,answers:[],showHint:false,scores:{},theme:document.documentElement.dataset.theme||'light'};
    const memoryStore={};
    const store={get(k){for(const s of [localStorage,sessionStorage]){try{return s.getItem(k)}catch{}}return memoryStore[k]||null},set(k,v){for(const s of [localStorage,sessionStorage]){try{s.setItem(k,v);return}catch{}}memoryStore[k]=v}};
    const $=id=>document.getElementById(id);
    const env=window.APP_ENV||{};
    function safeText(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
    function optionLabel(o){return `${safeText(o.word)} [${safeText(o.partOfSpeechKo)}]`}
    function speak(text,e){e&&e.stopPropagation(); if(!('speechSynthesis' in window)){setStatus('이 브라우저는 음성 합성을 지원하지 않습니다.');return} speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=.85; speechSynthesis.speak(u)}
    function loadScores(){try{state.scores=JSON.parse(store.get('orangeScores')||'{}')}catch{state.scores={}}}
    function saveScore(){const total=state.lesson.questions.length,correct=state.answers.filter((a,i)=>state.lesson.questions[i].answerOptions[a]?.isCorrect).length;state.scores[state.lesson.lessonId]={correct,total,percent:Math.round(correct/total*100)};store.set('orangeScores',JSON.stringify(state.scores));renderLessons()}
    function setStatus(msg){const el=$('status'); if(el) el.textContent=msg}
    function selectLesson(id){state.lesson=state.lessons.find(l=>l.lessonId===id);state.index=0;state.answers=[];state.showHint=false;closeMenu();renderLessons();renderQuiz()}
    function renderLessons(){ $('lessonList').innerHTML=state.lessons.map(l=>{const s=state.scores[l.lessonId];return `<button class="lesson ${state.lesson?.lessonId===l.lessonId?'active':''}" onclick="selectLesson('${l.lessonId}')"><strong>${safeText(l.lessonTitle)}</strong>${s?`<span class="score-badge">${s.percent}%</span>`:''}<br><small>${safeText(l.title)} · ${l.questions.length}문제</small></button>`}).join('') }
    function renderQuiz(){const q=state.lesson.questions[state.index], answered=state.answers[state.index]!==undefined, pick=state.answers[state.index]; const pct=state.index/state.lesson.questions.length*100; $('app').innerHTML=`<div><span class="pill">${safeText(state.lesson.lessonTitle)}</span><h2>${safeText(state.lesson.title)}</h2><div class="progress"><div class="bar" style="width:${pct}%"></div></div><p>${state.index+1} / ${state.lesson.questions.length}</p><div class="definition">${q.questionHTML||safeText(q.question)}</div><button class="btn secondary" onclick="toggleHint()">💡 힌트 ${state.showHint?'숨기기':'보기'}</button>${state.showHint?`<div class="hint">${safeText(q.hintHTML).replace('📖 문제 뜻:','📖 문제 뜻:')}</div>`:''}<div class="options">${q.answerOptions.map((o,i)=>{let cls='option'; if(answered&&o.isCorrect)cls+=' correct'; if(answered&&pick===i&&!o.isCorrect)cls+=' wrong'; return `<button class="${cls}" onclick="choose(${i})"><span>${optionLabel(o)}</span><span class="speak" onclick="speak('${safeText(o.speakText).replace(/'/g,'\\&#39;')}',event)">🔊</span></button>`}).join('')}</div>${answered?`<div class="rationales"><strong>해설</strong><ul>${q.answerOptions.map(o=>`<li>${optionLabel(o)}: ${safeText(o.rationale)}</li>`).join('')}</ul></div><button class="btn" onclick="nextQuestion()">${state.index===state.lesson.questions.length-1?'결과 보기':'다음 문제'}</button>`:''}<p class="status" id="status"></p></div>`}
    function toggleHint(){state.showHint=!state.showHint;renderQuiz()}
    function choose(i){if(state.answers[state.index]!==undefined)return;state.answers[state.index]=i;state.showHint=false;renderQuiz()}
    function nextQuestion(){if(state.index<state.lesson.questions.length-1){state.index++;state.showHint=false;renderQuiz()}else renderResult()}
    function reviewItem(q,i){const picked=q.answerOptions[state.answers[i]], correct=q.answerOptions.find(o=>o.isCorrect);return `<li><strong>Q${i+1}.</strong> ${safeText(q.question)}<br>내 답: ${picked?optionLabel(picked):'미응답'} <button class="speak" onclick="speak('${safeText((picked||correct).speakText).replace(/'/g,'\\&#39;')}',event)">🔊</button><br>정답: ${optionLabel(correct)} <button class="speak" onclick="speak('${safeText(correct.speakText).replace(/'/g,'\\&#39;')}',event)">🔊</button></li>`}
    function renderResult(){saveScore();const total=state.lesson.questions.length,correct=state.answers.filter((a,i)=>state.lesson.questions[i].answerOptions[a]?.isCorrect).length,percent=Math.round(correct/total*100);$('app').innerHTML=`<h2>🎉 결과</h2><p class="definition">${correct} / ${total}점 · 정답률 ${percent}%</p><div class="share"><button class="btn" onclick="copyLink()">🔗 링크 복사</button><button class="btn secondary" onclick="shortenLink()">TinyURL 단축</button><button class="btn secondary" onclick="showQr()">QR 코드</button><button class="btn secondary" onclick="shareKakao()">카카오톡 공유</button></div><p class="status" id="status"></p><div id="qrBox"></div><h3>문제별 복습 리스트</h3><ol class="review">${state.lesson.questions.map(reviewItem).join('')}</ol><button class="btn" onclick="selectLesson('${state.lesson.lessonId}')">다시 풀기</button>`}
    function shareUrl(){return env.PUBLIC_URL||location.href.split('#')[0]}
    async function copyLink(){await navigator.clipboard.writeText(shareUrl());setStatus('링크를 복사했습니다.')}
    async function shortenLink(){try{const r=await fetch('https://tinyurl.com/api-create.php?url='+encodeURIComponent(shareUrl()));const t=await r.text();await navigator.clipboard.writeText(t);setStatus('TinyURL을 복사했습니다: '+t)}catch(e){setStatus('TinyURL 생성에 실패했습니다. 링크 복사를 이용해 주세요.')}}
    function showQr(){ $('qrBox').innerHTML=`<img class="qr" alt="QR code" src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(shareUrl())}">` }
    function loadKakaoSdk(){return new Promise((resolve,reject)=>{if(window.Kakao)return resolve(window.Kakao);const s=document.createElement('script');s.src='https://developers.kakao.com/sdk/js/kakao.min.js';s.onload=()=>resolve(window.Kakao);s.onerror=reject;document.head.appendChild(s)})}
    async function shareKakao(){ if(!env.KAKAO_JS_KEY){setStatus('KAKAO_JS_KEY가 없어 카카오톡 공유 대신 링크 복사를 이용해 주세요.');return} try{const Kakao=await loadKakaoSdk(); if(!Kakao.isInitialized())Kakao.init(env.KAKAO_JS_KEY); Kakao.Share.sendDefault({objectType:'feed',content:{title:'ESL Rainbows Orange Vol.2 Quiz',description:'Unit-Lesson 영어 단어 퀴즈를 풀어 보세요.',imageUrl:'https://dummyimage.com/600x315/f97316/ffffff&text=Orange+Vol.2+Quiz',link:{mobileWebUrl:shareUrl(),webUrl:shareUrl()}},buttons:[{title:'퀴즈 열기',link:{mobileWebUrl:shareUrl(),webUrl:shareUrl()}}]});}catch(e){setStatus('카카오톡 공유를 열 수 없습니다. 링크 복사를 이용해 주세요.')}}
    function closeMenu(){$('sidebar').classList.remove('open');$('overlay').classList.remove('show')}
    $('menuBtn').onclick=()=>{$('sidebar').classList.add('open');$('overlay').classList.add('show')}; $('overlay').onclick=closeMenu;
    $('themeBtn').onclick=()=>{const dark=document.documentElement.dataset.theme!=='dark';document.documentElement.dataset.theme=dark?'dark':'light';$('themeBtn').textContent=dark?'☀️ 라이트 모드':'🌙 다크 모드'};
    fetch('quizData.json').then(r=>r.json()).then(data=>{state.data=data;state.lessons=data.units.flatMap(u=>u.lessons);loadScores();state.lesson=state.lessons[0];renderLessons();renderQuiz()}).catch(e=>{$('app').textContent='quizData.json을 불러오지 못했습니다.';console.error(e)});
    Object.assign(window,{selectLesson,toggleHint,choose,nextQuestion,speak,copyLink,shortenLink,showQr,shareKakao});
  </script>
</body>
</html>
